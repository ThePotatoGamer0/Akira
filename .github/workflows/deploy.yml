name: Build and Push Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    # These permissions are required for GitHub Actions to authenticate and push to GHCR
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Sets up Docker Buildx (best practice for building images in GitHub Actions)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Logs into the GitHub Container Registry
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Builds the Dockerfile in the root directory and pushes it
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/thepotatogamer0/akira-bot:latest